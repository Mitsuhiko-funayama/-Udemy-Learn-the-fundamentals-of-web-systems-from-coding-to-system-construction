<!--
    セマンティックHTMLとは？

    セマンティック（semantic）
        「意味の、語義の、意味論の、意味的な」

    セマンティックHTML
        その HTML 要素には、どのような目的や役割があるのか？ 
-->
<h1></h1>
<div>こんにちわー！</div>
<nav>こんにちわー！</nav> <!--
　　　　　　　　　　　　　　セマンティックHTMLの考え方
　　　　　　　　　　　　　　<div>も<nav>もブラウザで表示する分には違いがないように思える。
    　　　　　　　　　　　　しかし、そこにセマンティックHTMLの考え方がある。
    　　　　　　　　　　　　そのタグにその様な役割や機能があるのか、を表している。
    　　　　　　　　　　　　<nav>はナビゲーション、メニュー等を作る時に使われる。
    　　　　　　　　　　　　-->
